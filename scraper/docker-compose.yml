version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # ── Scraper Workers ──────────────────────────────────
  scraper-worker:
    build: .
    command: celery -A celery_app worker --loglevel=info
    volumes:
      - .:/app
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    depends_on:
      - redis

  scraper-beat:
    build: .
    command: celery -A celery_app beat --loglevel=info
    volumes:
      - .:/app
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    depends_on:
      - redis

  # ── Chatbot Workers ─────────────────────────────────
  chatbot-heavy:
    build:
      context: ..
      dockerfile: backend/chatbot/Dockerfile
    command: celery -A celery_app worker -Q heavy --concurrency=2 --loglevel=info
    volumes:
      - ../backend/chatbot:/app
      - ../chatbot:/chatbot
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

  chatbot-medium:
    build:
      context: ..
      dockerfile: backend/chatbot/Dockerfile
    command: celery -A celery_app worker -Q medium --concurrency=2 --loglevel=info
    volumes:
      - ../backend/chatbot:/app
      - ../chatbot:/chatbot
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

  chatbot-light:
    build:
      context: ..
      dockerfile: backend/chatbot/Dockerfile
    command: celery -A celery_app worker -Q light --concurrency=4 --loglevel=info
    volumes:
      - ../backend/chatbot:/app
      - ../chatbot:/chatbot
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

