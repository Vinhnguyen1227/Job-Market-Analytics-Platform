services:
  redis:
    image: redis:alpine
    container_name: job-market-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mongodb:
    image: mongo:latest
    container_name: job-market-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: job-market-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  next-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: job-market-web
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - MONGODB_URI=mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/job_market_analytics?authSource=admin
      - ELASTICSEARCH_NODE=http://elasticsearch:9200
      - CHATBOT_BACKEND_URL=http://chatbot-api:8000
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: job-market-qdrant
    ports: ["6333:6333"]
    volumes: ["qdrant_data:/qdrant/storage"]
    restart: unless-stopped

  chatbot-api:
    build:
      context: .
      dockerfile: backend/chatbot/Dockerfile
    container_name: job-market-chatbot-api
    ports:
      - "8000:8000"
    command: uvicorn server:app --host 0.0.0.0 --port 8000
    env_file: [.env.docker]
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - ELASTICSEARCH_NODE=http://elasticsearch:9200
      - OLLAMA_HOST=http://host.docker.internal:11434
      - MODEL_TOOL_CALL=careerintel-tool-call
      - MODEL_HR_COACH=careerintel-hr-coach
      - MODEL_STRUCTURED_GEN=careerintel-structured-gen
    extra_hosts: ["host.docker.internal:host-gateway"]
    depends_on:
      redis: {condition: service_healthy}
      qdrant: {condition: service_started}
      elasticsearch: {condition: service_healthy}
    restart: unless-stopped

  celery-worker:
    build:
      context: .
      dockerfile: backend/chatbot/Dockerfile
    container_name: job-market-celery
    command: celery -A celery_app worker -l info -Q ml
    env_file: [.env.docker]
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_HOST=http://host.docker.internal:11434
      - MODEL_HR_COACH=careerintel-hr-coach
      - MODEL_STRUCTURED_GEN=careerintel-structured-gen
    extra_hosts: ["host.docker.internal:host-gateway"]
    depends_on: [redis, qdrant]
    restart: unless-stopped

volumes:
  redis_data:
  mongo_data:
  es_data:
  qdrant_data:
