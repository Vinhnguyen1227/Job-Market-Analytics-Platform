name: Automated Job Scraper & Normalizer

on:
  # Lịch chạy tự động: 19:00 UTC = 02:00 sáng giờ VN. Chạy mỗi 3 ngày
  schedule:
    - cron: '0 19 */3 * *'
  
  # Cho phép bấm nút chạy thủ công trên giao diện GitHub
  workflow_dispatch:

jobs:
  scrape_and_normalize:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # Tối đa 2 tiếng
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # ── PIPELINE FLOW ──────────────────────────────────────────────
      # Step 5: Scrape → raw upsert to Supabase (no FastAPI, direct upsert)
      # Step 6: Offline normalization via fix_khac_offline.py (calls Gemini API)
      # NOTE: ES sync is handled separately in the cloud deployment environment
      # ──────────────────────────────────────────────────────────────────

      # ── BƯỚC 1: LẤY CODE ──────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── BƯỚC 2: CÀI NODE.JS ───────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      # ── BƯỚC 3: CÀI PYTHON ────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          cd python-ml-service
          pip install -r requirements.txt

      # ── BƯỚC 4: CÀI PLAYWRIGHT ────────────────────────────────────
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # ── BƯỚC 5: SCRAPE DỮ LIỆU ────────────────────────────────────
      - name: Run Scraper (Playwright)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run jobs:github

      # ── BƯỚC 6: CHUẨN HÓA DỮ LIỆU (OFFLINE - KHÔNG CẦN FASTAPI) ──
      - name: Normalize jobs data (Rule-Based Offline)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd python-ml-service
          # Tạo file .env.local tạm thời từ GitHub Secrets
          echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" > ../.env.local
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" >> ../.env.local
          echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" >> ../.env.local
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> ../.env.local
          # Chạy script chuẩn hóa offline
          python -u fix_khac_offline.py

      # ── BƯỚC 7: BÁO CÁO KẾT QUẢ ──────────────────────────────────
      - name: Done
        run: echo "Pipeline hoàn tất! Dữ liệu đã được cào và chuẩn hóa thành công."
